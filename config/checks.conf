# SystemHealthScan - 检查项阈值配置
# 格式：KEY=VALUE
# 警告和严重两级阈值

# === CPU 阈值 ===
# CPU 使用率百分比
WARN_CPU_USAGE=70
CRIT_CPU_USAGE=90

# CPU 负载（相对 CPU 核心数的比值）
WARN_CPU_LOAD_RATIO=0.7
CRIT_CPU_LOAD_RATIO=1.5

# === 内存阈值 ===
# 内存使用率百分比
WARN_MEM_PERCENT=80
CRIT_MEM_PERCENT=95

# SWAP 使用率百分比
WARN_SWAP_PERCENT=30
CRIT_SWAP_PERCENT=60

# === 磁盘阈值 ===
# 磁盘使用率百分比
WARN_DISK_PERCENT=80
CRIT_DISK_PERCENT=90

# Inode 使用率百分比
WARN_INODE_PERCENT=80
CRIT_INODE_PERCENT=90

# === 进程阈值 ===
# Zombie 进程数量
WARN_ZOMBIE_COUNT=5
CRIT_ZOMBIE_COUNT=20

# === 网络阈值 ===
# TCP CLOSE_WAIT 连接数
WARN_CLOSE_WAIT=50
CRIT_CLOSE_WAIT=200

# TCP TIME_WAIT 连接数
WARN_TIME_WAIT=500
CRIT_TIME_WAIT=2000

# === 安全阈值 ===
# 今日登录失败次数
WARN_LOGIN_FAILED=10
CRIT_LOGIN_FAILED=50

# SSH 慢速暴力破解（每分钟尝试次数）
WARN_SSH_BRUTE_RATE=5

# === IO 阈值 ===
# IO Wait 百分比
WARN_IO_WAIT=20
CRIT_IO_WAIT=40

# IO Util 百分比
WARN_IO_UTIL=80
CRIT_IO_UTIL=95

# === 日志阈值 ===
# 今日内核错误数
WARN_KERNEL_ERROR=5
CRIT_KERNEL_ERROR=20

# 今日认证失败数
WARN_AUTH_FAILED=10
CRIT_AUTH_FAILED=50

# === 中间件阈值 ===
# Redis 内存使用百分比
WARN_REDIS_MEM=80
CRIT_REDIS_MEM=95

# MySQL 慢查询累计数
WARN_MYSQL_SLOW_QUERIES=50
CRIT_MYSQL_SLOW_QUERIES=200

# MySQL 连接使用百分比
WARN_MYSQL_CONN_PERCENT=80
CRIT_MYSQL_CONN_PERCENT=95
